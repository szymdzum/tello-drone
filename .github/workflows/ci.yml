# Tests + lint + type check. The protocol invariants (reply quarantine,
# ground-gated keepalive, sticky land) live in tests/ — this keeps them pinned.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      # basedpyright reads venvPath/.venv from pyproject.toml, and the fpv/hud
      # tests import cv2 — headless build, no GUI libs on the runner. av and
      # matplotlib are optional at runtime but must resolve for the type check.
      - name: Create venv with FPV deps
        run: |
          python -m venv .venv
          .venv/bin/pip install opencv-python-headless numpy av matplotlib
      - name: Tests
        run: .venv/bin/python -m unittest discover -s tests -v
      - name: Lint (ruff)
        run: pipx run ruff check .
      - name: Type check (basedpyright)
        run: pipx run basedpyright
